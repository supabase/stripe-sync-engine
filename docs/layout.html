<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}}</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="/" class="logo">Stripe Sync Engine</a>
    </nav>
    <main>{{content}}</main>
    <footer>
      <p>Built with <a href="https://markdoc.dev">Markdoc</a></p>
    </footer>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs'
      // Markdoc renders ```mermaid as <pre data-language="mermaid">
      document.querySelectorAll('pre[data-language="mermaid"]').forEach((el) => {
        el.classList.add('mermaid')
      })
      mermaid.initialize({ startOnLoad: true, theme: 'neutral' })
    </script>
  </body>
</html>
