name: Build

on:
  pull_request:
  push:
    branches: [main, v2]
  workflow_dispatch:

permissions:
  packages: write
  contents: read

env:
  STRIPE_NPM_REGISTRY: https://npm.pkg.github.com

jobs:
  build:
    name: Build & push to GitHub registries
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Install dependencies & build
        run: pnpm install --frozen-lockfile && pnpm build

      # --- npm: publish @stripe/* to GitHub Packages ---

      - name: Publish to GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          pnpm -r --filter '!./tests/*' publish \
            --registry "$STRIPE_NPM_REGISTRY" \
            --access public \
            --no-git-checks \
            2>&1 || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Docker: build & push to ghcr.io ---

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg COMMIT_URL=${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Docker smoke test
        run: docker run --rm ghcr.io/${{ github.repository }}:${{ github.sha }} --version
