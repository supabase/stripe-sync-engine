# TODO: rename this file back to e2e.yml once it exists on the default branch
name: E2E

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
  workflow_dispatch:

permissions:
  packages: read
  contents: read

env:
  STRIPE_NPM_REGISTRY: https://npm.pkg.github.com

jobs:
  e2e:
    name: E2E & integration tests
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Install dependencies & build
        run: pnpm install --frozen-lockfile && pnpm build

      # --- Docker tests ---

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker tests
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          IMAGE="ghcr.io/${{ github.repository }}:${SHA}"
          docker pull "$IMAGE"
          if [ -n "${STRIPE_API_KEY:-}" ]; then
            bash tests/docker-test.sh "$IMAGE"
          else
            echo "::warning::Docker e2e skipped — STRIPE_API_KEY not available. Running smoke only."
            docker run --rm "$IMAGE" --version
          fi
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          DATABASE_URL: 'postgres://postgres:postgres@localhost:55432/postgres'

      # --- Plugin loading test ---

      - name: E2E plugin loading test
        run: bash tests/e2e-plugin-loading.sh

      # --- Integration tests (real Stripe API) ---

      - name: Integration tests
        run: |
          if [ -z "${STRIPE_API_KEY:-}" ]; then
            echo "::warning::Integration tests skipped — STRIPE_API_KEY not available (fork PR?)"
            exit 0
          fi
          pnpm --filter @stripe/sync-test-integration run test:integration
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          POSTGRES_URL: 'postgres://postgres:postgres@localhost:55432/postgres'

      # --- E2E vitest tests (real Stripe API) ---

      - name: E2E vitest tests
        run: |
          if [ -z "${STRIPE_API_KEY:-}" ]; then
            echo "::warning::E2E tests skipped — STRIPE_API_KEY not available (fork PR?)"
            exit 0
          fi
          pnpm --filter @stripe/sync-test-e2e run test
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          POSTGRES_URL: 'postgres://postgres:postgres@localhost:55432/postgres'
