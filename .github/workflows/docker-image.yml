name: Publish Docker image

on:
  workflow_dispatch:

# Builds and pushes to Docker Hub: https://hub.docker.com/r/stripe/sync-engine
#
# Tags:
#   - branch name (e.g. stripe/sync-engine:v2, stripe/sync-engine:main)
#   - full commit SHA (e.g. stripe/sync-engine:abc123...)
#   - "latest" on default branch only
#
# Build metadata is baked into the image as ENV vars (GIT_COMMIT, BUILD_DATE,
# COMMIT_URL) so it's visible in Docker Hub's layer view and at runtime.
# OCI labels are also added via docker/metadata-action but Docker Hub's web UI
# doesn't display them — use `docker buildx imagetools inspect` to see them.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN_SYNC_ENGINE }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: stripe/sync-engine
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            COMMIT_URL=${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
