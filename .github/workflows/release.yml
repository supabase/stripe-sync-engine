name: Release

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to promote (must have been built by build.yml)'
        required: true
        type: string

permissions:
  packages: read
  contents: read

jobs:
  npm:
    name: Promote npm packages to npmjs.org
    runs-on: ubuntu-24.04

    steps:
      - name: Pack from GitHub Packages and publish to npmjs.org
        run: |
          set -euo pipefail
          WORKDIR=$(mktemp -d)
          cd "$WORKDIR"

          # Auth for reading from GitHub Packages
          echo "@stripe:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> .npmrc

          # Discover @stripe/* packages from GitHub Packages API
          PACKAGES=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages?package_type=npm&per_page=100" \
            | node -e "
              const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              pkgs.filter(p => p.repository && p.repository.name === '${{ github.event.repository.name }}')
                  .forEach(p => console.log('@${{ github.repository_owner }}/' + p.name));
            ")

          echo "Packages to promote:"
          echo "$PACKAGES"
          echo ""

          for pkg in $PACKAGES; do
            echo "--- $pkg ---"
            npm pack "$pkg" --registry https://npm.pkg.github.com
          done

          echo ""
          echo "=== Publishing to npmjs.org ==="
          for tgz in *.tgz; do
            echo "Publishing $tgz"
            npm publish "$tgz" --registry https://registry.npmjs.org --access public
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_//registry.npmjs.org/:_authToken: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Promote Docker image to Docker Hub
    runs-on: ubuntu-24.04

    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN_SYNC_ENGINE }}

      - name: Pull from ghcr.io and push to Docker Hub
        run: |
          SOURCE="ghcr.io/${{ github.repository }}:${{ inputs.sha }}"
          docker pull "$SOURCE"
          docker tag "$SOURCE" stripe/sync-engine:${{ inputs.sha }}
          docker tag "$SOURCE" stripe/sync-engine:latest
          docker push stripe/sync-engine:${{ inputs.sha }}
          docker push stripe/sync-engine:latest
