name: Deploy Docs

on:
  push:
    branches: [main, v2]
    paths: [docs/**]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: docs
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: docs
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Build slides
        run: |
          npm install --legacy-peer-deps
          NODE_OPTIONS="--max-old-space-size=4096" ./node_modules/.bin/slidev build \
            --base /slides/architecture/ architecture.md \
            --out ../.vercel/output/static/slides/architecture
          NODE_OPTIONS="--max-old-space-size=4096" ./node_modules/.bin/slidev build \
            --base /slides/demo/ demo.md \
            --out ../.vercel/output/static/slides/demo
        working-directory: docs/slides

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: docs
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      # TODO: set up a proper custom domain.
      # Currently deployed to: https://stripe-sync-engine-pages.vercel.app/
