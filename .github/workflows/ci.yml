name: CI

on:
  pull_request:
  push:
    branches: [main, v2]
  workflow_dispatch:

permissions:
  packages: write
  contents: read

env:
  STRIPE_NPM_REGISTRY: https://npm.pkg.github.com

jobs:
  # ---------------------------------------------------------------------------
  # Test — lint, build, unit & integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Lint, build & test
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      - name: Start services
        run: docker compose up -d --wait

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Set up .env file
        run: |
          touch packages/source-stripe/.env
          echo DATABASE_URL='postgres://postgres:postgres@localhost:55432/postgres?sslmode=disable&search_path=stripe' >> packages/source-stripe/.env
          echo NODE_ENV=dev >> packages/source-stripe/.env
          echo STRIPE_SECRET_KEY=sk_test_ >> packages/source-stripe/.env
          echo STRIPE_WEBHOOK_SECRET=whsec_ >> packages/source-stripe/.env
          echo SCHEMA=stripe >> packages/source-stripe/.env
          echo PORT=8080 >> packages/source-stripe/.env
          echo API_KEY=api_key_test >> packages/source-stripe/.env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Formatting checks
        run: pnpm format:check
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Ensure all shell tests are wired up
        run: |
          missing=()
          for f in e2e/*.test.sh; do
            name=$(basename "$f")
            if ! grep -rq "$name" .github/workflows/; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Not referenced in any workflow: %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Initialize DB schema
        run: |
          docker run --rm \
            --network="host" \
            -e PGPASSWORD=postgres \
            postgres:18 \
            psql -h localhost -p 55432 -U postgres -d postgres -c 'create schema if not exists "stripe";'

      - name: stripe-mock smoke test
        run: bash e2e/stripe-mock.test.sh

      - name: Tests
        run: pnpm --filter '!@stripe/sync-e2e' test
        env:
          DATABASE_URL: 'postgres://postgres:postgres@localhost:55432/postgres?sslmode=disable&search_path=stripe'
          POSTGRES_URL: 'postgres://postgres:postgres@localhost:55432/postgres'
          STRIPE_MOCK_URL: 'http://localhost:12111'
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_SPREADSHEET_ID: ${{ vars.GOOGLE_SPREADSHEET_ID }}

      - name: Skipped test warnings
        if: always()
        run: '[ -f /tmp/vitest-skip-warnings.txt ] && cat /tmp/vitest-skip-warnings.txt || true'

  # ---------------------------------------------------------------------------
  # Publish npm — publish @stripe/* packages to GitHub Packages
  # ---------------------------------------------------------------------------
  publish_npm:
    name: Publish npm packages
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Install dependencies & build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Publish to GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          ./scripts/publish-packages.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build arm64 — native arm build
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker (arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Install dependencies & build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (arm64)
        run: |
          docker build \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg COMMIT_URL=${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }}-arm64 \
            .

      - name: Push Docker image (arm64)
        run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}-arm64

  # ---------------------------------------------------------------------------
  # Build amd64 — native x86 build in parallel with arm64
  # ---------------------------------------------------------------------------
  build_amd64:
    name: Build Docker (amd64)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Install dependencies & build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (amd64)
        run: |
          docker build \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg COMMIT_URL=${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }}-amd64 \
            .

      - name: Push Docker image (amd64)
        run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}-amd64

  # ---------------------------------------------------------------------------
  # Merge — combine arm64 + amd64 into a single multi-arch manifest
  # ---------------------------------------------------------------------------
  build_manifest:
    name: Merge multi-arch manifest
    needs: [build, build_amd64]
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          TAG="${GITHUB_REF_NAME//\//-}"
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}:${TAG} \
            ghcr.io/${{ github.repository }}:${{ github.sha }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ github.sha }}-arm64

      - name: Docker smoke test
        run: docker run --rm ghcr.io/${{ github.repository }}:${{ github.sha }} --version

  # ---------------------------------------------------------------------------
  # E2E — pull Docker image, run e2e & connector-loading tests
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E tests
    needs: build_manifest
    runs-on: ubuntu-24.04-arm

    services:
      temporal-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: temporal
          POSTGRES_PASSWORD: temporal
        options: >-
          --health-cmd "pg_isready -U temporal"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      temporal:
        image: temporalio/auto-setup:latest
        env:
          DB: postgres12
          DB_PORT: 5432
          POSTGRES_USER: temporal
          POSTGRES_PWD: temporal
          POSTGRES_SEEDS: temporal-db
        ports:
          - 7233:7233

    steps:
      - uses: actions/checkout@v5

      - name: Start Postgres with SSL
        run: |
          docker run -d --name ci-postgres \
            -e POSTGRES_PASSWORD=postgres \
            -p 55432:5432 \
            postgres:18 \
            -c ssl=on \
            -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem \
            -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
          for i in $(seq 1 30); do
            docker exec ci-postgres pg_isready -U postgres && break || sleep 2
          done

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Install psql client
        run: sudo apt-get update -q && sudo apt-get install -y postgresql-client

      - name: Install dependencies & build
        run: pnpm install --frozen-lockfile && pnpm build

      # --- Docker tests ---

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker tests
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
          docker pull "$IMAGE"
          if [ -n "${STRIPE_API_KEY:-}" ]; then
            bash e2e/docker.test.sh "$IMAGE"
          else
            echo "::warning::Docker e2e skipped — STRIPE_API_KEY not available. Running smoke only."
            docker run --rm "$IMAGE" --version
          fi
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          POSTGRES_URL: 'postgres://postgres:postgres@localhost:55432/postgres'
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_SPREADSHEET_ID: ${{ vars.GOOGLE_SPREADSHEET_ID }}

      - name: Smokescreen proxy e2e
        run: |
          if [ -z "${STRIPE_API_KEY:-}" ]; then
            echo "::warning::smokescreen.test.sh skipped — STRIPE_API_KEY not available"
            exit 0
          fi
          bash e2e/smokescreen.test.sh
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          ENGINE_IMAGE: 'ghcr.io/${{ github.repository }}:${{ github.sha }}'

      # --- Connector loading test ---

      - name: Connector loading test
        run: bash e2e/connector-loading.test.sh

      # --- E2E vitest tests (real Stripe API) ---

      - name: E2E vitest tests
        run: |
          if [ -z "${STRIPE_API_KEY:-}" ]; then
            echo "::warning::E2E tests skipped — STRIPE_API_KEY not available (fork PR?)"
            exit 0
          fi
          pnpm --filter @stripe/sync-e2e run test
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          POSTGRES_URL: 'postgres://postgres:postgres@localhost:55432/postgres'
          TEMPORAL_ADDRESS: 'localhost:7233'

      - name: Publish test
        run: |
          if [ -z "${STRIPE_NPM_REGISTRY:-}" ]; then
            echo "::warning::publish.test.sh skipped — STRIPE_NPM_REGISTRY not set"
            exit 0
          fi
          bash e2e/publish.test.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Docs — deploy to Vercel (always, so e2e_cdn can test the live CDN)
  # ---------------------------------------------------------------------------
  docs:
    name: Deploy Docs
    runs-on: ubuntu-24.04-arm
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel config
        run: |
          ENV=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
          vercel pull --yes --environment=$ENV --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: docs
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Build
        run: |
          PROD=${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          vercel build $PROD --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: docs
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Build slides
        run: |
          npm install --legacy-peer-deps
          NODE_OPTIONS="--max-old-space-size=4096" ./node_modules/.bin/slidev build \
            --base /slides/architecture/ architecture.md \
            --out ../.vercel/output/static/slides/architecture
          NODE_OPTIONS="--max-old-space-size=4096" ./node_modules/.bin/slidev build \
            --base /slides/demo/ demo.md \
            --out ../.vercel/output/static/slides/demo
        working-directory: docs/slides

      - name: Build visualizer
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @stripe/sync-protocol build
          pnpm --filter @stripe/sync-openapi build
          pnpm --filter @stripe/sync-source-stripe build
          pnpm --filter @stripe/sync-visualizer build
          mkdir -p docs/.vercel/output/static/visualizer
          cp -r apps/visualizer/out/. docs/.vercel/output/static/visualizer/

      - name: Deploy
        id: deploy
        run: |
          PROD=${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          BRANCH_SLUG="${GITHUB_REF_NAME//\//-}"
          url=$(vercel deploy --prebuilt $PROD \
            --meta gitBranch="$GITHUB_REF_NAME" \
            --meta gitCommit="$GITHUB_SHA" \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch:** \`$GITHUB_REF_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** $url" >> "$GITHUB_STEP_SUMMARY"
          echo "**CDN:** $url/stripe-api-specs/manifest.json" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "Deployed: $url  (branch: $GITHUB_REF_NAME)"
        working-directory: docs
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      # main → https://stripe-sync.dev/ | branch → unique preview URL

  # ---------------------------------------------------------------------------
  # E2E CDN — verify stripe-sync.dev/stripe-api-specs after Vercel deploy
  # ---------------------------------------------------------------------------
  e2e_cdn:
    name: E2E CDN
    needs: [docs]
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Install dependencies & build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: CDN e2e tests
        run: pnpm --filter @stripe/sync-e2e run test -- openapi-cdn.test.ts
        env:
          STRIPE_SPEC_CDN_BASE_URL: ${{ needs.docs.outputs.deployment_url }}/stripe-api-specs

  # ---------------------------------------------------------------------------
  # Docker Hub — promote the built GHCR image to Docker Hub tags
  # ---------------------------------------------------------------------------
  publish_dockerhub:
    name: Publish Docker Hub
    needs: [build_manifest]
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: scripts/promote-to-dockerhub.sh

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN_SYNC_ENGINE }}

      - name: Sanitize ref name for Docker tag
        id: tag
        run: echo "name=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Promote built image to Docker Hub
        run: bash scripts/promote-to-dockerhub.sh
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
          DOCKERHUB_TAGS: ${{ steps.tag.outputs.name }} latest
