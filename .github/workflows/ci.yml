name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - v2
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:18
        ports:
          - 55432:5432
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Set up .env file
        run: |
          touch packages/source-stripe/.env
          echo DATABASE_URL='postgres://postgres:postgres@localhost:55432/postgres?sslmode=disable&search_path=stripe' >> packages/source-stripe/.env
          echo NODE_ENV=dev >> packages/source-stripe/.env
          echo STRIPE_SECRET_KEY=sk_test_ >> packages/source-stripe/.env
          echo STRIPE_WEBHOOK_SECRET=whsec_ >> packages/source-stripe/.env
          echo SCHEMA=stripe >> packages/source-stripe/.env
          echo PORT=8080 >> packages/source-stripe/.env
          echo API_KEY=api_key_test >> packages/source-stripe/.env

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Formatting checks
        run: |
          pnpm format:check

      - name: Lint
        run: |
          pnpm lint

      - name: Builds successfully
        run: |
          pnpm build

      - name: Check migrations-embedded.ts is up to date
        run: |
          pnpm format
          git diff --exit-code packages/destination-postgres/src/database/migrations-embedded.ts || \
            (echo "::error::migrations-embedded.ts is out of date. Run 'pnpm build && pnpm format' locally and commit the updated file." && exit 1)

      - name: Initialize DB schema
        run: |
          docker run --rm \
            --network="host" \
            -e PGPASSWORD=postgres \
            postgres:15 \
            psql -h localhost -p 55432 -U postgres -d postgres -c 'create schema if not exists "stripe";'

      - name: Tests
        run: |
          npm run test
        env:
          DATABASE_URL: 'postgres://postgres:postgres@localhost:55432/postgres?sslmode=disable&search_path=stripe'

      # Integration tests require packages/sync-engine which has been removed.
      # TODO: Migrate integration tests to the new package structure.
      # - name: Integration Tests
      #   run: |
      #     cd packages/sync-engine && npm run test:integration
      #   env:
      #     TEST_POSTGRES_DB_URL: 'postgresql://postgres:postgres@localhost:55432/postgres'

  e2e-test:
    name: CLI e2e tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ./.nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Set up .env file
        run: |
          touch apps/cli/.env
          echo DATABASE_URL='postgresql://postgres:postgres@localhost:5432/app_db' >> apps/cli/.env
          echo STRIPE_API_KEY='${{ secrets.STRIPE_API_KEY }}' >> apps/cli/.env
          echo STRIPE_API_KEY_2='${{ secrets.STRIPE_API_KEY_2 }}' >> apps/cli/.env
          echo STRIPE_API_KEY_3='${{ secrets.STRIPE_API_KEY_3 }}' >> apps/cli/.env
          echo NGROK_AUTH_TOKEN='${{ secrets.NGROK_AUTH_TOKEN }}' >> apps/cli/.env

      # E2E tests require packages/sync-engine which has been removed.
      # TODO: Migrate E2E tests to the new package structure (apps/cli).
