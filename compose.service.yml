# Application layer — engine + service API + Temporal worker.
# Use together with compose.yml:
#   docker compose -f compose.yml -f compose.service.yml up --build -d
#
# Requires pre-built dist/ in build context: run `pnpm build` first.

services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4010:3000'
    environment:
      PORT: '3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  service:
    build:
      context: .
      dockerfile: Dockerfile.service
    ports:
      - '4020:4020'
    command:
      - serve
      - --temporal-address
      - temporal:7233
      - --temporal-task-queue
      - sync-engine
      - --port
      - '4020'
    depends_on:
      engine:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4020/health || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.service
    command:
      - worker
      - --temporal-address
      - temporal:7233
      - --temporal-task-queue
      - sync-engine
      - --engine-url
      - http://engine:3000
    depends_on:
      engine:
        condition: service_healthy
      temporal:
        condition: service_healthy
